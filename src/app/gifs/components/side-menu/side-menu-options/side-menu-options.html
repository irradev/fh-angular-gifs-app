<div id="nav" class="w-full px-6">

    @for (option of menuOptions; track option.route) {
    <a [routerLink]="option.route"
        class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 bg-blue-800 hover:bg-white/5 transition ease-linear duration-150"
        routerLinkActive="bg-blue-800" [routerLinkActiveOptions]="{exact: true}">
        <i [class]="option.icon" class="w-6 h-6 text-white"></i>
        <div class="flex flex-col gap-1">
            <span class="text-lg font-bold leading-5 text-white">{{ option.label }}</span>
            <span class="text-sm text-white/50 hidden md:block">{{ option.subLabel }}</span>
        </div>
    </a>
    }

    <div class="px-2">
        <h3 class="text-md font-bold py-3 text-slate-400">Historial de busquedas</h3>
    </div>

    @for (key of gifsFacade.searchedHistoryKeys(); track key) {
    <!-- <a [routerLink]="'/dashboard/search'" [queryParams]="{ q: key }" -->
    <a [routerLink]="['/dashboard/search-history', key]"
        class="w-full px-2 inline-flex space-x-2 items-center  border-b border-slate-700 py-3 bg-blue-800 hover:bg-white/5 transition ease-linear duration-150"
        routerLinkActive="bg-blue-800" [routerLinkActiveOptions]="{exact: true}">
        <i class="fa-solid fa-clock-rotate-left w-4 h-4 text-white"></i>
        <div class="flex flex-col gap-1 items-center justify-center">
            <span class="text-lg font-bold leading-5 text-white">{{ key }}</span>
            <!-- <span class="text-sm text-white/50 hidden md:block">{{ key }}</span> -->
        </div>
    </a>
    }
</div>
