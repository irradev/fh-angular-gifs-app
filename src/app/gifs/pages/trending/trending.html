<section class="py-5">
    @if (gifsFacade.isLoading()) {
    <p>Cargando...</p>
    }@else if (gifsFacade.error()) {
    <p class="text-red-500">{{ gifsFacade.error() }}</p>
    } @else if (gifsFacade.trendingGifs().length === 0) {
    <p>No se encontraron gifs</p>
    } @else {
    <gifs-gif-list [gifs]="gifsFacade.trendingGifs()" />
    }
</section>
